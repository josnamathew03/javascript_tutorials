<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rock paper scissors</title>
</head>
<body>
    <p>
        Rock Paper Scissor
    </p>
    <button onclick="
        game('Rock');
        
    ">
        Rock
    </button>

    <button onclick="
    game('Paper');
">
        Paper
    </button>
    
    <button onclick="
        game('Scissors');
"
    >
        Scissors
    </button>
    <script>
        function game(playermov){
            const move=rand();
            let res='';
            if(playermov==='Scissors'){
                if(move==='rock'){
                    res='you lose';
                }
                else if(move==='paper'){
                    res='you win';
                }
                else if(move==='scissors'){
                    res='tie';
                }
            }

            else if(playermov==='Paper'){
                if(move==='rock'){
                    res='you win';
                }
                else if(move==='paper'){
                    res='tie';
                }
                else if(move==='scissors'){
                    res='you lose';
                }
            }

            else if(playermov==='Rock'){
                if(move==='rock'){
                    res='tie';
                }
                else if(move==='paper'){
                    res='you lose';
                }
                else if(move==='scissors'){
                    res='you won';
                }
            }
            alert(`computer pick ${move}.${res}`)
        }


        //let move='';
        function rand(){
            const no=Math.random();
            let move='';

            if(no>=0 && no<=1/3)
            {
                move='rock';
            }
            else if(no>1/3 && no<=2/3)
            {
                move='paper';
            }
            else if(no>=2/3 && no<=1)
            {
                move='scissors';
            }
            return move;
        }
    </script>
</body>
</html>
