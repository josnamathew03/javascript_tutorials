<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practical variables</title>
</head>
<body>
    <button onclick="update(1)">
        1
    </button>
    <button onclick="update(2)">
        2
    </button>
    <button onclick="update(3)">
        3
    </button>
    <button onclick="update('+')">
        +    
    </button>
    <button onclick="calcu=eval(calcu); console.log(calcu)">
        =      
    </button>
<script>
    function update(vari){
        calcu+=vari;
        console.log(calcu)
    }
    let calcu = '';

</script>
</body>
</html>
